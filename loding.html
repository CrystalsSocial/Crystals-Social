<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal Social</title>
    <style>
        body {
            background: linear-gradient(135deg, #060606 0%, #0a0a1a 100%);
            margin: 0;
            font-family: "Roboto", "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .center-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .image-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 150px;
            height: 150px;
            z-index: 3;
        }

        .pulsating-image {
            width: 100%;
            height: auto;
            border-radius: 50%;
            z-index: 4;
            filter: drop-shadow(0 0 10px rgba(26, 219, 237, 0.5));
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pulsating-image svg {
            width: 100%;
            height: auto;
            max-width: 150px;
            max-height: 150px;
            display: block;
            margin: 0 auto;
        }

        .pulsating-circle {
            position: absolute;
            width: 330px;
            height: 330px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(26, 219, 237, 0.3) 0%, rgba(26, 86, 237, 0.1) 70%, transparent 100%);
            animation: pulse 2s infinite ease-in-out;
            z-index: 2;
        }

        .pulsating-circle2 {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 77, 166, 0.2) 0%, rgba(138, 43, 226, 0.1) 70%, transparent 100%);
            animation: pulse2 2s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }
            100% {
                transform: scale(0.8);
                opacity: 0.3;
            }
        }

        @keyframes pulse2 {
            0%, 100% {
                transform: scale(0.9);
                opacity: 0.2;
            }
            50% {
                transform: scale(1.5);
                opacity: 0.4;
            }
        }

        .loading-text {
            color: #1ADBED;
            font-size: 1.2rem;
            margin-top: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            animation: textPulse 2s infinite alternate;
            text-shadow: 0 0 10px rgba(26, 219, 237, 0.7);
        }

        @keyframes textPulse {
            0% {
                opacity: 0.5;
                text-shadow: 0 0 5px rgba(26, 219, 237, 0.5);
            }
            100% {
                opacity: 1;
                text-shadow: 0 0 15px rgba(26, 219, 237, 0.9), 0 0 20px rgba(26, 219, 237, 0.5);
            }
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background-color: #FFFFFF;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.2;
            }
            50% {
                opacity: 1;
            }
        }

        .color-palette {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 10px;
            opacity: 0.7;
        }

        .color-sample {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
    </style>
</head>

    <script>
        // Redirección después de 3 segundos
        setTimeout(function() {
            window.location.href = "crystal-social.org/mx/inicio.html";
        }, 3000);

        // Prevenir zoom con gestos táctiles
        document.addEventListener('touchmove', function (event) {
            if (event.scale !== 1) {
                event.preventDefault();
            }
        }, { passive: false });

        // Prevenir zoom usando Ctrl + Scroll (en computadoras)
        document.addEventListener('wheel', function (event) {
            if (event.ctrlKey) {
                event.preventDefault();
            }
        }, { passive: false });

        // Crear estrellas en el fondo
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                // Tamaño aleatorio
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                
                // Posición aleatoria
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                
                // Color aleatorio de la paleta
                const colors = ['#1ADBED', '#1A56ED', '#1AEDB9', '#FF4DA6', '#FFD600', '#8A2BE2', '#FFFFFF'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                star.style.backgroundColor = color;
                
                // Animación con delay aleatorio
                star.style.animationDelay = `${Math.random() * 5}s`;
                
                starsContainer.appendChild(star);
            }
        }

        // Inicializar estrellas cuando se carga la página
        window.addEventListener('DOMContentLoaded', createStars);
    </script>
